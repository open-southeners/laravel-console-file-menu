name: phpstan

on: [ push, pull_request ]

jobs:
  analyze:
    runs-on: ubuntu-latest

    name: PHPStan - PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            laravel: '^11.0'
          - php: '8.2'
            laravel: '^12.0'
          - php: '8.3'
            laravel: '^13.0'
          - php: '8.4'
            laravel: '^13.0'

    steps:
      - name: 🏗 Checkout code
        uses: actions/checkout@v6

      - name: 🏗 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: 🏗 Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: 🏗 Cache dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: phpstan-composer-${{ runner.os }}-${{ matrix.php }}-${{ matrix.laravel }}-${{ hashFiles('composer.json') }}
          restore-keys: phpstan-composer-

      - name: 🏗 Set Laravel version
        run: composer require illuminate/console:${{ matrix.laravel }} illuminate/support:${{ matrix.laravel }} --no-update --no-interaction

      - name: 📦 Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: 🧪 Analyse code
        run: vendor/bin/phpstan analyse
